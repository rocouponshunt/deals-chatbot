<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealsHub — Deal Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#161625;--bg4:#1e1e30;
  --border:#2a2a40;--accent:#ff6b2b;--accent2:#ff9500;
  --text:#f0f0f5;--text2:#9090a8;--text3:#5a5a70;
  --green:#00d97e;--red:#ff4560;--blue:#4da6ff;
  --radius:14px;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:780px;margin:0 auto}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
#topbar-title{font-family:var(--font);font-size:17px;font-weight:700;letter-spacing:-0.3px}
#topbar-title span{color:var(--accent)}
#new-deal-btn{background:var(--accent);border:none;color:#fff;padding:0 14px;height:34px;border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:500;transition:all .15s}
#new-deal-btn:hover{background:var(--accent2)}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;flex-direction:column;max-width:82%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}.msg.user{align-self:flex-end}
.msg-label{font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.msg.user .msg-label{text-align:right}
.bubble{padding:11px 15px;border-radius:var(--radius);line-height:1.6;font-size:13.5px}
.msg.bot .bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.user .bubble{background:var(--accent);border-bottom-right-radius:4px;color:#fff}
.bubble .hi{color:var(--accent);font-weight:500}.bubble .gr{color:var(--green)}.bubble .rd{color:var(--red)}
.kb-card{background:var(--bg4);border:1px solid var(--accent);border-radius:10px;padding:14px;margin-top:6px}
.kb-card-label{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kb-card-content{font-size:12.5px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
#typing{display:none;align-self:flex-start;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px}
#typing span{display:inline-block;width:7px;height:7px;background:var(--text3);border-radius:50%;animation:bounce .9s infinite}
#typing span:nth-child(2){animation-delay:.15s}#typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.product-card{background:var(--bg4);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:6px;display:flex}
.product-card-img{width:90px;height:90px;object-fit:contain;flex-shrink:0;background:var(--bg3);padding:6px}
.product-card-img-placeholder{width:90px;height:90px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px;flex-shrink:0}
.product-card-body{padding:12px;flex:1}
.product-card-name{font-family:var(--font);font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4}
.product-card-retailer{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.product-card-prices{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.price-mrp{text-decoration:line-through;color:var(--text3);font-size:12px}
.price-deal{color:var(--green);font-weight:500;font-size:15px}
.price-badge{background:rgba(255,107,43,.15);color:var(--accent);font-size:10px;padding:2px 7px;border-radius:4px}
.avail-badge{font-size:10px;padding:2px 7px;border-radius:4px}
.avail-badge.in{background:rgba(0,217,126,.12);color:var(--green)}
.avail-badge.out{background:rgba(255,69,96,.12);color:var(--red)}
.waterfall{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:12px;margin-top:6px;font-family:var(--mono)}
.wf-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--text2)}
.wf-row.strike .wf-val{text-decoration:line-through;color:var(--text3)}
.wf-row.deduct .wf-val{color:var(--green)}
.wf-row.add .wf-val{color:var(--red)}
.wf-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.wf-row.total{color:var(--text);font-weight:500}
.wf-row.total .wf-val{color:var(--accent);font-size:14px}
.wf-row.saving{color:var(--green);font-size:11px}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;align-self:flex-start;max-width:100%}
.qr-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 13px;border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .15s;white-space:nowrap}
.qr-btn:hover,.qr-btn.accent{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.store-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;align-self:flex-start;width:100%;max-width:420px}
.store-search{width:100%;background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:9px;font-family:var(--mono);font-size:13px;outline:none;transition:border .15s;margin-bottom:2px}
.store-search:focus{border-color:var(--accent)}
.store-search::placeholder{color:var(--text3)}
.store-results{display:flex;flex-direction:column;gap:6px}
.store-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.store-item:hover{border-color:var(--accent);background:var(--bg4)}
.store-item-name{font-family:var(--font);font-size:13px;font-weight:600}
.store-item-cb{font-size:11px;color:var(--text3)}
#input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
#input-wrap{display:flex;gap:10px;align-items:flex-end}
#input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:11px 15px;border-radius:10px;font-family:var(--mono);font-size:13.5px;resize:none;min-height:44px;max-height:120px;outline:none;transition:border .15s;line-height:1.5}
#input:focus{border-color:var(--accent)}
#input::placeholder{color:var(--text3)}
#send-btn{background:var(--accent);border:none;color:#fff;width:44px;height:44px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .15s}
#send-btn:hover{background:var(--accent2)}
#send-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
#status-bar{padding:5px 20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;justify-content:space-between}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-title">Deals<span>Hub</span> <span style="color:var(--text3);font-weight:400;font-size:13px">/ Deal Creator</span></div>
    <button id="new-deal-btn">＋ New Deal</button>
  </div>
  <div id="chat"><div id="typing"><span></span><span></span><span></span></div></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="Paste a URL, dump all deal info at once, or just chat..."></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
  <div id="status-bar">
    <div><span class="status-dot"></span>Connected to DealsHub</div>
    <div id="step-indicator">Ready</div>
  </div>
</div>
<script>
const EDGE = {
  FETCH_PRODUCT:         'https://bdztgellimsbglxiuwcq.supabase.co/functions/v1/fetch-product',
  GET_STORES:            'https://bdztgellimsbglxiuwcq.supabase.co/functions/v1/get-stores',
  SAVE_DEAL:             'https://bdztgellimsbglxiuwcq.supabase.co/functions/v1/save-deal',
  GET_KB:                'https://bdztgellimsbglxiuwcq.supabase.co/functions/v1/get-kb',
  UPDATE_KB:             'https://bdztgellimsbglxiuwcq.supabase.co/functions/v1/update-kb',
  UPDATE_STORE_CASHBACK: 'https://bdztgellimsbglxiuwcq.supabase.co/functions/v1/update-store-cashback',
};

let STORES=[], KB=[], DEAL={}, flow_step='init', input_locked=false;
let PENDING_KB=null;

// ── Core helpers ─────────────────────────────────────────────────
const chatEl=document.getElementById('chat');
const typingEl=document.getElementById('typing');
const scrollBottom=()=>chatEl.scrollTop=chatEl.scrollHeight;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const fmt=n=>Number(n||0).toLocaleString('en-IN');
function setStep(s){flow_step=s;document.getElementById('step-indicator').textContent=s;}
function lockInput(){input_locked=true;document.getElementById('send-btn').disabled=true;}
function unlockInput(){input_locked=false;document.getElementById('send-btn').disabled=false;document.getElementById('input').focus();}
function showTyping(){typingEl.style.display='flex';scrollBottom();}
function hideTyping(){typingEl.style.display='none';}
async function botDelay(ms){showTyping();await sleep(ms);hideTyping();}
function parseArr(v){if(!v)return[];if(Array.isArray(v))return v;try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return[];}}

function addMsg(role,content,extra){
  const wrap=document.createElement('div');wrap.className='msg '+role;
  const label=document.createElement('div');label.className='msg-label';
  label.textContent=role==='bot'?'DEALSHUB':'YOU';
  const bubble=document.createElement('div');bubble.className='bubble';
  if(typeof content==='string')bubble.innerHTML=content.replace(/\n/g,'<br>');
  else bubble.appendChild(content);
  wrap.appendChild(label);wrap.appendChild(bubble);
  if(extra)wrap.appendChild(extra);
  chatEl.insertBefore(wrap,typingEl);scrollBottom();return wrap;
}

function addQuickReplies(options,onPick){
  const wrap=document.createElement('div');wrap.className='quick-replies';
  options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='qr-btn'+(opt.accent?' accent':'');
    b.textContent=opt.label||opt;
    b.onclick=()=>{wrap.remove();addMsg('user',opt.label||opt);onPick(opt.value!==undefined?opt.value:(opt.label||opt));};
    wrap.appendChild(b);
  });
  chatEl.insertBefore(wrap,typingEl);scrollBottom();
}

function addStoreList(initialStores,onPick){
  const wrap=document.createElement('div');wrap.className='store-list';
  const si=document.createElement('input');si.className='store-search';si.placeholder='Search retailer by name...';
  const re=document.createElement('div');re.className='store-results';
  wrap.appendChild(si);wrap.appendChild(re);
  function render(list){
    re.innerHTML='';
    list.slice(0,6).forEach(s=>{
      const item=document.createElement('div');item.className='store-item';
      item.innerHTML=`<div><div class="store-item-name">${s.report_storename}</div><div class="store-item-cb">${s.cashback}${s.cashback_type==='percent'?'%':'₹'} ${s.store_type}</div></div><div style="color:var(--text3);font-size:11px">${s.report_store_categoryname||''}</div>`;
      item.onclick=()=>{wrap.remove();addMsg('user',s.report_storename);onPick(s);};
      re.appendChild(item);
    });
    const notIn=document.createElement('div');notIn.className='store-item';notIn.style.borderStyle='dashed';
    notIn.innerHTML=`<div style="color:var(--text3)">Retailer not in list — add manually</div><div style="font-size:18px;color:var(--text3)">+</div>`;
    notIn.onclick=()=>{wrap.remove();addMsg('user','Not in list');onPick(null);};
    re.appendChild(notIn);scrollBottom();
  }
  render(initialStores);
  si.addEventListener('input',()=>{const q=si.value.trim().toLowerCase();render(q?STORES.filter(s=>s.report_storename.toLowerCase().includes(q)||(s.url_key||'').toLowerCase().includes(q)):initialStores);});
  si.addEventListener('keydown',e=>e.stopPropagation());
  chatEl.insertBefore(wrap,typingEl);setTimeout(()=>si.focus(),100);scrollBottom();
}

// ── KB approval ──────────────────────────────────────────────────
function showKBApproval(category,key,content,onApproved){
  PENDING_KB={category,key,content,onApproved};
  const card=document.createElement('div');card.className='kb-card';
  card.innerHTML=`<div class="kb-card-label">📚 Knowledge Base Update — Review before saving</div><div class="kb-card-content">${content}</div>`;
  addMsg('bot','I want to save this to my knowledge base. OK?',card);
  addQuickReplies([{label:'✅ Yes, save it',accent:true},{label:'✏ Edit it'},{label:'❌ Discard'}],async v=>{
    if(v==='✅ Yes, save it'){
      showTyping();
      try{
        await apiUpdateKB(PENDING_KB.category,PENDING_KB.key,PENDING_KB.content);
        KB.push({category:PENDING_KB.category,key:PENDING_KB.key,content:PENDING_KB.content});
        hideTyping();addMsg('bot',`<span class="gr">✅ Saved to knowledge base.</span>`);
        if(PENDING_KB.onApproved)PENDING_KB.onApproved();
      }catch(e){hideTyping();addMsg('bot',`<span class="rd">Failed to save KB.</span> ${e.message}`);}
      PENDING_KB=null;setStep('done');unlockInput();
    }else if(v==='✏ Edit it'){
      addMsg('bot','Type the updated content:');setStep('kb-edit');unlockInput();
    }else{
      PENDING_KB=null;addMsg('bot','Discarded.');setStep('done');unlockInput();
    }
  });
  setStep('kb-approval');
}

// ── Product card ─────────────────────────────────────────────────
function makeProductCard(p,store,qty){
  const card=document.createElement('div');card.className='product-card';
  const disc=p.mrp>p.discounted_price?Math.round((p.mrp-p.discounted_price)/p.mrp*100):0;
  const imgs=parseArr(p.image_urls);
  const imgEl=imgs[0]?`<img class="product-card-img" src="${imgs[0]}" onerror="this.style.display='none'">`:`<div class="product-card-img-placeholder">🛍</div>`;
  const effectiveMrp=(p.mrp||0)*(qty||1);
  const effectivePrice=(p.discounted_price||0)*(qty||1);
  const qtyLabel=qty>1?` <span style="color:var(--accent);font-size:10px">×${qty}</span>`:'';
  card.innerHTML=`${imgEl}<div class="product-card-body">
    <div class="product-card-name">${p.product_name}${qtyLabel}</div>
    <div class="product-card-retailer">${store?store.report_storename:p.retailer||''}</div>
    <div class="product-card-prices">
      <span class="price-mrp">₹${fmt(effectiveMrp)}</span>
      <span class="price-deal">₹${fmt(effectivePrice)}</span>
      ${disc>0?`<span class="price-badge">${disc}% off</span>`:''}
      <span class="avail-badge ${p.availability?'in':'out'}">${p.availability_status||'Unknown'}</span>
    </div></div>`;
  return card;
}

// ── Waterfall calc — cashback_type aware ─────────────────────────
// cashback can be % OR flat ₹ — always determined by store.cashback_type
// overrideCb is always numeric amount; overrideCbType tells us percent vs pound
function calcWaterfall(d,store,overrideCb,overrideCbType){
  const cb_val = overrideCb !== undefined ? overrideCb : (store?.cashback||0);
  const cb_type = overrideCbType || store?.cashback_type || 'percent';
  const cd=d.coupon_type==='percent'?d.discounted_price*(d.coupon_discount/100):(d.coupon_discount||0);
  const after_coupon=d.discounted_price-cd;
  const prepaid=d.prepaid_discount||store?.prepaid_discount||0;
  const prepaid_t=d.prepaid_type||store?.prepaid_type||'flat';
  const pd=prepaid_t==='percent'?after_coupon*(prepaid/100):prepaid;
  const after_prepaid=after_coupon-pd;
  const shipping=d.shipping_fee!==undefined?d.shipping_fee:(store?.shipping_fee||0);
  const rule=d.shipping_rule!==undefined?d.shipping_rule:(store?.shipping_rule||'yes');
  const subtotal=after_prepaid+shipping;
  const cb_base=rule==='yes'?subtotal:after_prepaid;
  const cb_amt=cb_type==='percent'?cb_base*(cb_val/100):cb_val;
  const price_after_cb=cb_base-cb_amt;
  const final=Math.round(rule==='no'?price_after_cb+shipping:price_after_cb);
  const disc_pct=d.mrp>0?Math.round((d.mrp-final)/d.mrp*100):0;
  return{cd,after_coupon,pd,after_prepaid,shipping,rule,subtotal,cb_base,cb_amt,final,disc_pct,cb_val,cb_type};
}

function makeWaterfallEl(d,store,overrideCb,overrideCbType){
  const w=calcWaterfall(d,store,overrideCb,overrideCbType);
  Object.assign(d,{cashback_amount:Math.round(w.cb_amt*100)/100,final_deal_price:w.final,discount_percent:w.disc_pct,shipping_fee:w.shipping,shipping_rule:w.rule});
  const cbLabel=w.cb_type==='percent'?`${w.cb_val}%`:`₹${fmt(w.cb_val)}`;
  const el=document.createElement('div');el.className='waterfall';
  let html=`<div class="wf-row strike"><span>MRP${d.quantity>1?` (×${d.quantity})`:''}  </span><span class="wf-val">₹${fmt(d.mrp)}</span></div>
    <div class="wf-row"><span>Discounted price</span><span class="wf-val">₹${fmt(d.discounted_price)}</span></div>`;
  if(w.cd>0)html+=`<div class="wf-row deduct"><span>Coupon (${d.coupon_code})</span><span class="wf-val">−₹${fmt(w.cd)}</span></div>
    <div class="wf-row"><span>After coupon</span><span class="wf-val">₹${fmt(w.after_coupon)}</span></div>`;
  if(w.pd>0)html+=`<div class="wf-row deduct"><span>Prepaid discount</span><span class="wf-val">−₹${fmt(w.pd)}</span></div>
    <div class="wf-row"><span>After prepaid</span><span class="wf-val">₹${fmt(w.after_prepaid)}</span></div>`;
  if(w.shipping>0)html+=`<div class="wf-row add"><span>+ Shipping</span><span class="wf-val">₹${fmt(w.shipping)}</span></div>`;
  html+=`<div class="wf-row deduct"><span>CashKaro ${cbLabel} cashback</span><span class="wf-val">−₹${fmt(w.cb_amt)}</span></div>
    <hr class="wf-divider">
    <div class="wf-row total"><span>FINAL DEAL PRICE</span><span class="wf-val">₹${fmt(w.final)}</span></div>
    <div class="wf-row saving"><span>🎉 Saving ${w.disc_pct}% vs MRP</span></div>`;
  el.innerHTML=html;return el;
}

// ── Parse cashback input — "18" = ₹18, "18%" = 18% ──────────────
// Rule: number with % sign = percent. Plain number = flat ₹.
function parseCashbackInput(text){
  const trimmed = (text||'').trim();
  if(trimmed.includes('%')){
    return{value:parseFloat(trimmed),type:'percent'};
  }
  // Strip ₹ symbol if present
  const num = parseFloat(trimmed.replace(/[₹,\s]/g,''));
  return{value:num,type:'pound'}; // pound = ₹ in cashkaro convention
}

// ── Parse coupon — "CK3 3%" or "CK3 3" or just "CK3" ───────────
function parseCouponInput(text){
  // Pattern 1: CODE AMOUNT% — e.g. "CK3 3%" or "SAVE10 10%"
  const withPct=text.match(/^([A-Z][A-Z0-9]{1,14})\s+(\d+\.?\d*)\s*%\s*$/i);
  if(withPct)return{code:withPct[1].toUpperCase(),discount:parseFloat(withPct[2]),type:'percent'};
  // Pattern 2: CODE AMOUNT — e.g. "CK50 50" (flat)
  const withFlat=text.match(/^([A-Z][A-Z0-9]{1,14})\s+(?:₹\s*)?(\d+\.?\d*)\s*$/i);
  if(withFlat)return{code:withFlat[1].toUpperCase(),discount:parseFloat(withFlat[2]),type:'flat'};
  // Pattern 3: just code — ask for amount separately
  const codeOnly=text.match(/^([A-Z][A-Z0-9]{1,14})\s*$/i);
  if(codeOnly)return{code:codeOnly[1].toUpperCase(),discount:null,type:null};
  return null;
}

// ── Parse one-shot message ───────────────────────────────────────
function parseOneShotMsg(text){
  const out={};
  const urlM=text.match(/https?:\/\/\S+/);if(urlM)out.url=urlM[0];
  // Coupon: "CK15 15%", "CK15 15", "BFF gives 50%", "coupon BFF 50% off"
  // Pattern 1: CODE directly followed by amount
  const couponM=text.match(/\b([A-Z][A-Z0-9]{1,14})\s+(\d+\.?\d*)\s*(%)?(?:\s|$)/);
  // Pattern 2: CODE ... amount% (with words in between like "which gives", "for", "of")
  const couponFuzzy=!couponM&&text.match(/\b([A-Z][A-Z0-9]{1,14})\b.{0,30}?(\d+\.?\d*)\s*(%)\s*(?:off|discount)?/i);
  if(couponM&&!['HTTP','HTTPS'].includes(couponM[1])){
    out.coupon_code=couponM[1];out.coupon_discount=parseFloat(couponM[2]);
    out.coupon_type=couponM[3]?'percent':'flat';
  } else if(couponFuzzy&&!['HTTP','HTTPS'].includes(couponFuzzy[1].toUpperCase())){
    out.coupon_code=couponFuzzy[1].toUpperCase();out.coupon_discount=parseFloat(couponFuzzy[2]);
    out.coupon_type='percent';
  }
  // Prepaid
  const prepaidM=text.match(/(?:prepaid|pre-paid)\s*(?:₹\s*)?(\d+\.?\d*)\s*(%)?/i);
  if(prepaidM){out.prepaid_discount=parseFloat(prepaidM[1]);out.prepaid_type=prepaidM[2]?'percent':'flat';}
  // Shipping
  if(/free\s*(?:shipping|delivery)/i.test(text)||/(?:shipping|delivery)\s*free/i.test(text))out.shipping_fee=0;
  else{const shM=text.match(/(?:shipping|delivery)\s*(?:₹\s*)?(\d+\.?\d*)/i);if(shM)out.shipping_fee=parseFloat(shM[1]);}
  // Cashback override — "cashback 4%" or "cb 4%" or "4% cashback"
  const cbPct=text.match(/(?:cashback|cb|reward)\s*(?:is\s*)?(\d+\.?\d*)\s*%/i)||text.match(/(\d+\.?\d*)\s*%\s*(?:cashback|cb|reward)/i);
  if(cbPct){out.cashback_override=parseFloat(cbPct[1]);out.cashback_type='percent';}
  const cbFlat=text.match(/(?:cashback|cb|reward)\s*(?:is\s*)?₹\s*(\d+\.?\d*)/i);
  if(cbFlat&&!cbPct){out.cashback_override=parseFloat(cbFlat[1]);out.cashback_type='pound';}
  // Quantity — "2x", "buy 2", "bogo", "3 quantity"
  const bogoM=/bogo|buy\s*(?:one\s*get\s*one|1\s*get\s*1)/i.test(text);
  if(bogoM)out.quantity=2;
  else{const qM=text.match(/(?:buy\s*|x\s*|qty\s*|quantity\s*)(\d+)|(\d+)\s*(?:x|pieces?|units?|qty)/i);if(qM)out.quantity=parseInt(qM[1]||qM[2]);}
  return out;
}

// ── Retailer matching ────────────────────────────────────────────
function matchStore(apiRetailer,productUrl,hint){
  const norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const tokens=s=>(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t.length>2);
  let domainRaw='';
  try{domainRaw=new URL(productUrl).hostname.replace(/^www\./,'').replace(/\.(com|in|co\.in|net|org|io)$/,'');}catch(e){}
  const checks=[norm(apiRetailer),norm(domainRaw),norm(hint||'')].filter(Boolean);
  for(const s of STORES){
    const key=norm(s.url_key),name=norm(s.report_storename);
    if(checks.some(c=>c===key||c===name))return{store:s,confidence:'high'};
    if(checks.some(c=>domainRaw&&(c.includes(key)||key.includes(c)||c.includes(name)||name.includes(c))))return{store:s,confidence:'high'};
  }
  const allTokens=[...tokens(apiRetailer),...tokens(domainRaw),...tokens(hint||'')];
  for(const s of STORES){
    const nT=tokens(s.report_storename),kT=tokens(s.url_key);
    const overlap=(a,b)=>a.filter(t=>b.some(bt=>bt.includes(t)||t.includes(bt))).length;
    if(allTokens.length&&(overlap(allTokens,nT)>0||overlap(allTokens,kT)>0))return{store:s,confidence:'medium'};
  }
  return null;
}

function scoreStoresForPicker(){
  const norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const tokens=s=>(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t.length>2);
  let domainRaw='';
  try{domainRaw=new URL(DEAL.product_url||'').hostname.replace(/^www\./,'').replace(/\.(com|in|co\.in|net|org|io)$/,'');}catch(e){}
  const domainNorm=norm(domainRaw),domainTokens=tokens(domainRaw),rTokens=tokens(DEAL.api_retailer||'');
  return[...STORES].map(s=>{
    const key=norm(s.url_key),name=norm(s.report_storename),nT=tokens(s.report_storename),kT=tokens(s.url_key);
    let score=0;
    if(key===domainNorm||name===domainNorm)score+=10;
    if(domainNorm&&(domainNorm.includes(key)||key.includes(domainNorm)))score+=6;
    if(domainNorm&&(domainNorm.includes(name)||name.includes(domainNorm)))score+=6;
    domainTokens.forEach(t=>{if(nT.some(nt=>nt.includes(t)||t.includes(nt)))score+=3;});
    rTokens.forEach(t=>{if(nT.some(nt=>nt.includes(t)||t.includes(nt)))score+=2;});
    return{s,score};
  }).sort((a,b)=>b.score-a.score).map(x=>x.s);
}

Analyse the user message and return ONLY valid JSON with these fields (omit fields not mentioned):

KB notes from previous sessions:\n${kbNotes}`;
  const result=await callGPT(system,text);

// ── Category detection ───────────────────────────────────────────
async function detectCategory(productName,retailerCat){
  const kbCats=KB.filter(k=>k.category==='category_mapping').map(k=>k.content).join('\n');
  try{
    const res=await fetch(EDGE.SAVE_DEAL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({__gpt_classify:true,product_name:productName,retailer_category:retailerCat||'',kb_rules:kbCats})});
    if(res.ok){const d=await res.json();if(d.category)return d.category;}
  }catch(e){}
  const low=(productName||'').toLowerCase();
  if(/earbuds|headphone|speaker|laptop|phone|mobile|tablet|tv|monitor|camera|charger|keyboard|mouse|smartwatch|powerbank/i.test(low))return'Electronics';
  if(/serum|sunscreen|facewash|shampoo|moisturiser|lotion|cream|gel|scrub/i.test(low))return'Beauty';
  if(/shirt|jeans|dress|kurta|shoes|sneakers|bag|jacket/i.test(low))return'Fashion';
  if(/detergent|soap|cleaner|cookware|bedsheet|mattress/i.test(low))return'Home and Kitchen';
  if(/protein|vitamin|medicine|supplement/i.test(low))return'Healthcare and Wellness';
  return retailerCat||'Miscellaneous';
}

// ── Main router ──────────────────────────────────────────────────
async function handleUserInput(text){
  if(input_locked)return;
  text=text.trim();if(!text)return;
  lockInput();

  // Special step modes
  if(flow_step==='kb-edit'){if(PENDING_KB){PENDING_KB.content=text;showKBApproval(PENDING_KB.category,PENDING_KB.key,text,PENDING_KB.onApproved);}else unlockInput();return;}
  if(flow_step==='kb-approval'){unlockInput();return;}
  if(flow_step==='coupon-amount'){await parseCouponAmountStep(text);return;}
  if(flow_step==='retailer-manual-name'){DEAL.manual_retailer_name=text;await botDelay(300);addMsg('bot','Cashback? Use <span class="hi">10%</span> for percent or <span class="hi">₹50</span> or just <span class="hi">50</span> for flat ₹');setStep('retailer-manual-cb');unlockInput();return;}
  if(flow_step==='retailer-manual-cb'){
    const cb=parseCashbackInput(text);
    DEAL.manual_cb=cb.value;DEAL.manual_cb_type=cb.type;
    await botDelay(300);addMsg('bot','Cashback or Rewards store?');
    addQuickReplies(['Cashback','Rewards'],async v=>{DEAL.store={report_storename:DEAL.manual_retailer_name,cashback:DEAL.manual_cb,cashback_type:DEAL.manual_cb_type,store_type:v,prepaid_discount:0,prepaid_type:'flat',shipping_fee:0,shipping_rule:'yes',groupid:'A'};await stepCat();});
    setStep('retailer-manual-type');return;
  }
  if(flow_step==='upto-confirm'){
    const cb=parseCashbackInput(text);
    DEAL.cashback_override=cb.value;DEAL.cashback_override_type=cb.type;
    addMsg('bot',`Cashback set to <span class="hi">${cb.type==='percent'?cb.value+'%':'₹'+cb.value}</span> for this deal.`);
    await stepCat();return;
  }
  if(flow_step==='b1-existing-rate'){
    const cb=parseCashbackInput(text);
    DEAL.b1_existing_cashback=cb.value;DEAL.cashback_override=DEAL.b1_new_cashback;DEAL.is_b1=true;
    addMsg('bot',`Got it.\n• New user: <span class="hi">${DEAL.b1_new_cashback}%</span>\n• Existing user: <span class="hi">${cb.type==='percent'?cb.value+'%':'₹'+cb.value}</span>`);
    await stepCat();return;
  }
  if(flow_step==='prepaid-input'){await step4b_gotPrepaid(text);return;}
  if(flow_step==='shipping-input'){await step5b_gotShipping(text);return;}
  if(flow_step==='edit-field'){await handleEdit(text);return;}

  // ── Mid-flow contextual parsing ───────────────────────────────────
  // If user types free-form text while bot is waiting for a button click,
  // parse it in context of the current step instead of ignoring it.
  const midFlowSteps = ['coupon-choice','prepaid-choice','prepaid-input','shipping-choice',
    'shipping-rule','confirm-retailer','upto-confirm-check','b1-choice','confirm-deal'];
  if(midFlowSteps.includes(flow_step)){
    // Remove any pending quick-reply buttons — user chose to type instead
    document.querySelectorAll('.quick-replies').forEach(el=>el.remove());
    document.querySelectorAll('.store-list').forEach(el=>el.remove());

    // Parse the free-form message for deal-relevant info
    const local=parseOneShotMsg('https://x.com '+text); // prefix so parser runs
    // Quantity
    const qtyM=text.match(/(?:bogo|buy\s*(?:one\s*get\s*one|1\s*get\s*1))/i)?{quantity:2}:
               text.match(/(?:buy\s*|×|x\s*)?(\d+)\s*(?:x|pieces?|units?|qty|quantity)/i)||
               text.match(/(\d+)\s*(?:x\b)/i);
    if(/bogo/i.test(text)){DEAL.quantity=2;DEAL.mrp=(DEAL.base_mrp||DEAL.mrp/1)*2;DEAL.discounted_price=(DEAL.base_price||DEAL.discounted_price/1)*2;addMsg('bot',`BOGO applied — quantity ×2. MRP: ₹${fmt(DEAL.mrp)} | Price: ₹${fmt(DEAL.discounted_price)}.`);}
    else if(qtyM){const q=parseInt(qtyM[1]);if(q>1&&q<=20){DEAL.quantity=q;DEAL.mrp=(DEAL.base_mrp||(DEAL.mrp/1))*q;DEAL.discounted_price=(DEAL.base_price||(DEAL.discounted_price/1))*q;addMsg('bot',`Quantity ×${q} applied.`);}}

    // Coupon from free-form — handles "BFF which gives 50% discount" or "BFF 50%"
    if(local.coupon_code){
      DEAL.coupon_code=local.coupon_code;DEAL.coupon_discount=local.coupon_discount;DEAL.coupon_type=local.coupon_type;
      const discStr=local.coupon_type==='percent'?local.coupon_discount+'%':'₹'+local.coupon_discount;
      addMsg('bot',`Coupon <span class="hi">${local.coupon_code}</span> — <span class="hi">${discStr}</span> off detected.`);
    } else if(/no coupon|no code/i.test(text)){
      DEAL.coupon_code=null;DEAL.coupon_discount=0;DEAL.coupon_type='flat';
    }
    // Prepaid
    if(local.prepaid_discount!==undefined){DEAL.prepaid_discount=local.prepaid_discount;DEAL.prepaid_type=local.prepaid_type||'flat';addMsg('bot',`Prepaid: <span class="hi">${local.prepaid_type==='percent'?local.prepaid_discount+'%':'₹'+local.prepaid_discount}</span>`);}
    // Shipping
    if(local.shipping_fee!==undefined){DEAL.shipping_fee=local.shipping_fee;addMsg('bot',`Shipping: <span class="hi">${local.shipping_fee===0?'free':'₹'+local.shipping_fee}</span>`);}
    // Cashback override
    if(local.cashback_override!==undefined){DEAL.cashback_override=local.cashback_override;DEAL.cashback_override_type=local.cashback_type||'percent';}

    // Decide what to do next based on what was collected
    // If we now have a coupon (or explicit no coupon), continue to next step
    if(DEAL.coupon_code!==undefined||/no coupon|no code/i.test(text)){
      await step4_prepaid();
    } else if(flow_step==='confirm-deal'){
      await handleEdit(text);
    } else {
      // Still missing coupon — re-ask naturally
      await botDelay(300);
      addMsg('bot',`Got it! Any coupon code for this deal? Or say <span class="hi">no coupon</span>.`);
      setStep('coupon-choice');unlockInput();
    }
    return;
  }

  // ── Use GPT to understand free-form input ───────────────────────
  showTyping();
  let parsed=null;
  try{parsed=await gptParseIntent(text);}catch(e){}
  hideTyping();

  // Fallback to local parsing if GPT unavailable
  if(!parsed){
    parsed={};
    const hasUrl=/https?:\/\/\S+/.test(text);
    if(hasUrl)parsed.intent='new_deal';
    else if(text.toLowerCase().startsWith('remember')||text.toLowerCase().includes('from now on'))parsed.intent='teach';
    else parsed.intent='chat';
    const local=parseOneShotMsg(text);
    Object.assign(parsed,{url:local.url,coupon_code:local.coupon_code,coupon_discount:local.coupon_discount,coupon_type:local.coupon_type,prepaid_discount:local.prepaid_discount,prepaid_type:local.prepaid_type,shipping_fee:local.shipping_fee,cashback_override:local.cashback_override,cashback_override_type:local.cashback_type,quantity:local.quantity,retailer_hint:local.retailer_hint});
  }

  // Route by intent
  if(parsed.intent==='new_deal'||parsed.url){
    // Pre-fill from parsed data
    if(parsed.coupon_code){DEAL.prefilled_coupon_code=parsed.coupon_code;DEAL.prefilled_coupon_discount=parsed.coupon_discount;DEAL.prefilled_coupon_type=parsed.coupon_type;}
    if(parsed.prepaid_discount!==undefined){DEAL.prefilled_prepaid=parsed.prepaid_discount;DEAL.prefilled_prepaid_type=parsed.prepaid_type||'flat';}
    if(parsed.shipping_fee!==undefined)DEAL.prefilled_shipping=parsed.shipping_fee;
    if(parsed.cashback_override!==undefined){DEAL.cashback_override=parsed.cashback_override;DEAL.cashback_override_type=parsed.cashback_override_type||'percent';}
    if(parsed.retailer_hint)DEAL.retailer_hint=parsed.retailer_hint;
    if(parsed.quantity&&parsed.quantity>1)DEAL.prefilled_quantity=parsed.quantity;
    await step1_fetchProduct(parsed.url||text.match(/https?:\/\/\S+/)[0]);

  }else if(parsed.intent==='update_cashback'&&parsed.update_retailer){
    await handleUpdateCashback(parsed.update_retailer,parsed.update_cashback_value,parsed.update_cashback_type);

  }else if(parsed.intent==='teach'&&parsed.teach_content){
    const key='user_note_'+Date.now();
    showKBApproval('retailer_notes',key,parsed.teach_content||text,()=>{});

  }else if(parsed.intent==='chat'&&parsed.chat_reply){
    // GPT gave a conversational reply — show it and circle back
    addMsg('bot',parsed.chat_reply);
    setStep('waiting');unlockInput();

  }else{
    // Generic fallback
    addMsg('bot',`Got it! If you want to create a deal, paste a product URL. Or say something like:\n<span class="hi">update Flipkart cashback to 5%</span>\n<span class="hi">remember that Amazon doesn't track on B2B orders</span>`);
    setStep('waiting');unlockInput();
  }
}

// ── Handle cashback update ───────────────────────────────────────
async function handleUpdateCashback(retailer,value,type){
  const matched=STORES.find(s=>s.report_storename.toLowerCase()===retailer.toLowerCase())||
                STORES.find(s=>retailer.toLowerCase().includes(s.report_storename.toLowerCase()));
  if(!matched||value===undefined||value===null){addMsg('bot','Try: <span class="hi">Update Flipkart cashback to 5%</span> or <span class="hi">Set Amazon cashback to ₹50</span>');unlockInput();return;}
  const typeStr=type==='percent'?'%':'₹';
  await botDelay(400);
  addMsg('bot',`Update <span class="hi">${matched.report_storename}</span> cashback to <span class="hi">${type==='percent'?value+'%':'₹'+value}</span>?`);
  addQuickReplies([{label:'Yes, update',accent:true},{label:'Cancel'}],async v=>{
    if(v==='Cancel'){addMsg('bot','Cancelled.');setStep('done');unlockInput();return;}
    showTyping();
    try{
      await apiUpdateStoreCashback(matched.report_storename,value,type==='percent'?'percent':'pound');
      const si=STORES.findIndex(s=>s.report_storename===matched.report_storename);
      if(si>-1){STORES[si].cashback=value;STORES[si].cashback_type=type==='percent'?'percent':'pound';}
      hideTyping();
      addMsg('bot',`<span class="gr">✅ Done!</span> ${matched.report_storename} → ${type==='percent'?value+'%':'₹'+value} cashback.`);
      const kbContent=`${matched.report_storename} cashback updated to ${type==='percent'?value+'%':'₹'+value} on ${new Date().toLocaleDateString()}.`;
      showKBApproval('retailer_notes',matched.report_storename.toLowerCase().replace(/ /g,'_')+'_cb',kbContent,()=>{});
    }catch(e){hideTyping();addMsg('bot',`<span class="rd">Failed.</span> ${e.message}`);}
    setStep('done');unlockInput();
  });
  setStep('waiting');
}

// ── Step 1: Fetch product ────────────────────────────────────────
async function step1_fetchProduct(url){
  DEAL.product_url=url;
  await botDelay(800);addMsg('bot','Fetching product details...');showTyping();
  let product;
  try{product=await apiFetchProduct(url);}
  catch(e){hideTyping();addMsg('bot','<span class="rd">Couldn\'t fetch that product.</span> Check the URL and try again.');unlockInput();return;}
  hideTyping();
  if(!product.product_name){addMsg('bot','<span class="rd">Product not found.</span> Try a different URL.');unlockInput();return;}

  DEAL.product_name=product.product_name;
  // Apply quantity multiplier to MRP and discounted price
  const qty=DEAL.prefilled_quantity||1;
  DEAL.quantity=qty;
  DEAL.mrp=(product.mrp||0)*qty;
  DEAL.discounted_price=(product.discounted_price||0)*qty;
  DEAL.base_mrp=product.mrp;
  DEAL.base_price=product.discounted_price;
  let raw=product.image_urls||[];if(typeof raw==='string'){try{raw=JSON.parse(raw);}catch(e){raw=[];}}
  DEAL.image_urls=raw.slice(0,5);
  DEAL.availability=product.availability!==false;DEAL.availability_status=product.availability_status||'In Stock';
  DEAL.api_retailer=product.retailer||'';

  const match=matchStore(DEAL.api_retailer,url,DEAL.retailer_hint);
  addMsg('bot',makeProductCard(product,match?.store,qty));
  if(qty>1)addMsg('bot',`📦 Quantity <span class="hi">×${qty}</span> applied. MRP: <span class="hi">₹${fmt(DEAL.mrp)}</span> | Deal price: <span class="hi">₹${fmt(DEAL.discounted_price)}</span>`);
  await botDelay(500);

  if(match&&match.confidence==='high'){
    DEAL.store=match.store;
    addMsg('bot',`Matched to <span class="hi">${match.store.report_storename}</span> — ${match.store.cashback}${match.store.cashback_type==='percent'?'%':'₹'} ${match.store.store_type}. Correct?`);
    addQuickReplies([{label:'Yes, correct',accent:true},{label:'No, pick another'}],async v=>{
      if(v==='Yes, correct')await stepCashbackCheck();else await showStorePicker();
    });
    setStep('confirm-retailer');
  }else{
    await showStorePicker();
  }
  unlockInput();
}

async function showStorePicker(){
  await botDelay(400);addMsg('bot','Which retailer is this? Search by name:');
  addStoreList(scoreStoresForPicker().slice(0,5),async store=>{
    if(store){DEAL.store=store;await stepCashbackCheck();}
    else{await botDelay(300);addMsg('bot','What\'s the retailer name?');setStep('retailer-manual-name');unlockInput();}
  });
}

// ── Cashback check (B1 / Upto / A) ──────────────────────────────
async function stepCashbackCheck(){
  const store=DEAL.store,groupid=store?.groupid||'A';
  await botDelay(400);
  if(groupid==='B1'){
    DEAL.b1_new_cashback=store.cashback;
    const existingRate=store.rates?.find(r=>(r.rate_label||'').toLowerCase().includes('exist'));
    const existingCbStored=existingRate?.cashback||null;
    addMsg('bot',`<span class="hi">${store.report_storename}</span> is B1 — two cashback rates.\n• New user: <span class="hi">${store.cashback}${store.cashback_type==='percent'?'%':'₹'}</span>${existingCbStored?`\n• Existing user: <span class="hi">${existingCbStored}%</span> (from retailer rates)`:''}\n\nExisting user cashback % for this deal? (Enter <span class="hi">10%</span> for percent or <span class="hi">50</span> for flat ₹)`);
    setStep('b1-existing-rate');unlockInput();
  }else if(groupid!=='A'){
    if(DEAL.cashback_override!==undefined){
      const cbStr=DEAL.cashback_override_type==='percent'?DEAL.cashback_override+'%':'₹'+DEAL.cashback_override;
      addMsg('bot',`<span class="hi">${store.report_storename}</span> is Upto ${store.cashback}${store.cashback_type==='percent'?'%':'₹'}.\nUsing <span class="hi">${cbStr}</span> from your message — correct?`);
      addQuickReplies([{label:`Yes, ${cbStr}`,accent:true},{label:'No, enter correct rate'}],async v=>{
        if(v.startsWith('Yes'))await stepCat();
        else{addMsg('bot',`What cashback for this product? Use <span class="hi">4%</span> or <span class="hi">₹20</span>`);setStep('upto-confirm');unlockInput();}
      });
      setStep('upto-confirm-check');
    }else{
      addMsg('bot',`<span class="hi">${store.report_storename}</span> offers Upto <span class="hi">${store.cashback}${store.cashback_type==='percent'?'%':'₹'}</span>.\n\nActual cashback for this product? Use <span class="hi">4%</span> for percent or <span class="hi">₹20</span> / <span class="hi">20</span> for flat ₹`);
      setStep('upto-confirm');unlockInput();
    }
  }else{
    DEAL.cashback_override=undefined;DEAL.cashback_override_type=undefined;await stepCat();
  }
}

// ── GPT category then coupon ─────────────────────────────────────
async function stepCat(){
  showTyping();
  try{DEAL.detected_category=await detectCategory(DEAL.product_name,DEAL.store?.report_store_categoryname);}
  catch(e){DEAL.detected_category=DEAL.store?.report_store_categoryname||'Miscellaneous';}
  hideTyping();
  // Ask quantity if not already set
  if(!DEAL.quantity||DEAL.quantity<2){
    await step3_coupon();
  }else{
    await step3_coupon();// quantity already applied at fetch time
  }
}

// ── Step 3: Coupon ───────────────────────────────────────────────
async function step3_coupon(){
  await botDelay(400);
  if(DEAL.prefilled_coupon_code){
    DEAL.coupon_code=DEAL.prefilled_coupon_code;DEAL.coupon_discount=DEAL.prefilled_coupon_discount||0;DEAL.coupon_type=DEAL.prefilled_coupon_type||'flat';
    const discStr=DEAL.coupon_type==='percent'?DEAL.coupon_discount+'%':'₹'+DEAL.coupon_discount;
    addMsg('bot',`Coupon <span class="hi">${DEAL.coupon_code}</span> at <span class="hi">${discStr}</span> — confirmed.`);
    await step4_prepaid();return;
  }
  addMsg('bot','Coupon code? You can share code + discount together:\n<span class="hi">CK15 15%</span> — percent off\n<span class="hi">SAVE50 50</span> — flat ₹50 off\nOr just the code and I\'ll ask for discount amount.');
  addQuickReplies([{label:'Add coupon',accent:true},{label:'No coupon'}],async v=>{
    if(v==='No coupon'){DEAL.coupon_code=null;DEAL.coupon_discount=0;DEAL.coupon_type='flat';await step4_prepaid();}
    else{addMsg('bot','Type coupon code + discount (e.g. <span class="hi">CK15 15%</span> or <span class="hi">CK50 50</span>):');setStep('coupon-amount');unlockInput();}
  });
  setStep('coupon-choice');
}

async function parseCouponAmountStep(text){
  const parsed=parseCouponInput(text);
  if(!parsed){addMsg('bot','Couldn\'t parse. Try: <span class="hi">CK15 15%</span> or <span class="hi">SAVE50 50</span>');unlockInput();return;}
  if(parsed.discount===null){
    // Code only — ask for discount
    DEAL.coupon_code=parsed.code;
    addMsg('bot',`Got code <span class="hi">${parsed.code}</span>. What discount does it give?\nUse <span class="hi">15%</span> for percent off or <span class="hi">50</span> for flat ₹50 off.`);
    setStep('coupon-amount');unlockInput();return;
  }
  DEAL.coupon_code=parsed.code;DEAL.coupon_discount=parsed.discount;DEAL.coupon_type=parsed.type;
  const discStr=parsed.type==='percent'?parsed.discount+'%':'₹'+parsed.discount;
  addMsg('bot',`Coupon <span class="hi">${parsed.code}</span> — <span class="hi">${discStr}</span> off applied.`);
  await step4_prepaid();
}

// ── Step 4: Prepaid ──────────────────────────────────────────────
async function step4_prepaid(){
  const store=DEAL.store;await botDelay(400);
  if(DEAL.prefilled_prepaid!==undefined){
    DEAL.prepaid_discount=DEAL.prefilled_prepaid;DEAL.prepaid_type=DEAL.prefilled_prepaid_type||'flat';
    addMsg('bot',`Prepaid: <span class="hi">${DEAL.prefilled_prepaid_type==='percent'?DEAL.prefilled_prepaid+'%':'₹'+DEAL.prefilled_prepaid}</span>`);
    await step5_shipping();return;
  }
  if(store?.prepaid_discount>0){
    const pd=store.prepaid_type==='percent'?store.prepaid_discount+'%':'₹'+store.prepaid_discount;
    addMsg('bot',`${store.report_storename} has <span class="hi">${pd}</span> prepaid discount. Apply?`);
    addQuickReplies([{label:'Yes, apply it',accent:true},{label:'No prepaid'},{label:'Different amount'}],async v=>{
      if(v==='Yes, apply it'){DEAL.prepaid_discount=store.prepaid_discount;DEAL.prepaid_type=store.prepaid_type;await step5_shipping();}
      else if(v==='No prepaid'){DEAL.prepaid_discount=0;DEAL.prepaid_type='flat';await step5_shipping();}
      else{addMsg('bot','Prepaid amount? (e.g. <span class="hi">50</span> or <span class="hi">5%</span>)');setStep('prepaid-input');unlockInput();}
    });
    setStep('prepaid-choice');
  }else{
    addMsg('bot','Prepaid discount? (<span class="hi">50</span> for ₹50, <span class="hi">5%</span> for percent, or <span class="hi">no</span>)');
    setStep('prepaid-input');unlockInput();
  }
}
async function step4b_gotPrepaid(text){
  if(text.toLowerCase()==='no'||text==='0'){DEAL.prepaid_discount=0;DEAL.prepaid_type='flat';}
  else{DEAL.prepaid_type=text.trim().endsWith('%')?'percent':'flat';DEAL.prepaid_discount=parseFloat(text.replace(/[%₹,\s]/g,''));}
  await step5_shipping();
}

// ── Step 5: Shipping ─────────────────────────────────────────────
async function step5_shipping(){
  const store=DEAL.store;await botDelay(400);
  if(DEAL.prefilled_shipping!==undefined){
    DEAL.shipping_fee=DEAL.prefilled_shipping;
    addMsg('bot',`Shipping: <span class="hi">${DEAL.shipping_fee===0?'Free':'₹'+fmt(DEAL.shipping_fee)}</span>`);
    if(DEAL.shipping_fee>0)await askShippingRule();else{DEAL.shipping_rule='yes';await step6_summary();}return;
  }
  if(store?.shipping_fee>0){
    addMsg('bot',`Shipping for ${store.report_storename}: <span class="hi">₹${fmt(store.shipping_fee)}</span>. Use that?`);
    addQuickReplies([{label:`Yes, ₹${fmt(store.shipping_fee)}`,accent:true},{label:'Different amount'},{label:'Free'}],async v=>{
      if(v.startsWith('Yes')){DEAL.shipping_fee=store.shipping_fee;await askShippingRule();}
      else if(v==='Free'){DEAL.shipping_fee=0;DEAL.shipping_rule='yes';await step6_summary();}
      else{addMsg('bot','Shipping fee (₹):');setStep('shipping-input');unlockInput();}
    });
    setStep('shipping-choice');
  }else{
    addMsg('bot','Shipping fee? (₹ amount or <span class="hi">free</span>)');
    setStep('shipping-input');unlockInput();
  }
}
async function step5b_gotShipping(text){
  DEAL.shipping_fee=text.toLowerCase()==='free'||text==='0'?0:parseFloat(text.replace(/[₹,\s]/g,''));
  if(DEAL.shipping_fee>0)await askShippingRule();else{DEAL.shipping_rule='yes';await step6_summary();}
}
async function askShippingRule(){
  const store=DEAL.store,rule=store?.shipping_rule||'yes';await botDelay(300);
  addMsg('bot',`Cashback on shipping too? (${store?.report_storename||'this store'} default: <span class="hi">${rule==='yes'?'Yes':'No'}</span>)`);
  addQuickReplies([{label:'Yes',accent:rule==='yes'},{label:'No — product only',accent:rule==='no'}],async v=>{
    DEAL.shipping_rule=v==='Yes'?'yes':'no';await step6_summary();
  });
  setStep('shipping-rule');
}

// ── Step 6: Summary ──────────────────────────────────────────────
async function step6_summary(){
  await botDelay(500);
  const cbOverride=DEAL.cashback_override;
  const cbOverrideType=DEAL.cashback_override_type;
  const qtyNote=DEAL.quantity>1?` | Qty: <span class="hi">×${DEAL.quantity}</span>`:'';
  addMsg('bot',`Deal breakdown — ${DEAL.detected_category}${qtyNote}`,makeWaterfallEl(DEAL,DEAL.store,cbOverride,cbOverrideType));
  await sleep(400);
  addMsg('bot','Confirm to save as draft. GPT will generate the description.');
  addQuickReplies([{label:'✅ Confirm & Save',accent:true},{label:'✏ Edit something'}],async v=>{
    if(v==='✅ Confirm & Save')await step7_save();
    else{addMsg('bot','What to change? e.g.\n<span class="hi">coupon CK20 20%</span> or <span class="hi">coupon SAVE50 50</span> (flat)\n<span class="hi">shipping free</span>\n<span class="hi">cashback 8%</span> or <span class="hi">cashback ₹30</span>\n<span class="hi">quantity 3</span>');setStep('edit-field');unlockInput();}
  });
  setStep('confirm-deal');
}

async function handleEdit(text){
  const low=text.toLowerCase();
  // Use GPT to parse edit intent
  let parsed=null;
  try{parsed=await gptParseIntent('edit: '+text);}catch(e){}

  // Coupon
  const couponP=parseCouponInput(text.trim());
  if(couponP&&couponP.discount!==null){
    DEAL.coupon_code=couponP.code;DEAL.coupon_discount=couponP.discount;DEAL.coupon_type=couponP.type;
    addMsg('bot',`Coupon → <span class="hi">${couponP.code} ${couponP.type==='percent'?couponP.discount+'%':'₹'+couponP.discount}</span>`);
  }else if(low.includes('coupon')&&(low.includes('no')||low.includes('remove')||low.includes('none'))){
    DEAL.coupon_code=null;DEAL.coupon_discount=0;DEAL.coupon_type='flat';addMsg('bot','Coupon removed.');
  }
  // Cashback — CRITICAL: detect % vs flat
  const cbM=text.match(/(?:cashback|cb)\s*(?:is\s*)?(\d+\.?\d*)\s*(%)?/i);
  if(cbM){
    DEAL.cashback_override=parseFloat(cbM[1]);
    DEAL.cashback_override_type=cbM[2]?'percent':'pound';
    addMsg('bot',`Cashback → <span class="hi">${cbM[2]?cbM[1]+'%':'₹'+cbM[1]}</span>`);
  }
  // Shipping
  if(/free\s*(?:shipping|delivery)|(?:shipping|delivery)\s*free/i.test(text)){DEAL.shipping_fee=0;addMsg('bot','Shipping → free');}
  else{const shM=text.match(/(?:shipping|delivery)\s*(?:₹\s*)?(\d+)/i);if(shM){DEAL.shipping_fee=parseFloat(shM[1]);addMsg('bot',`Shipping → ₹${fmt(DEAL.shipping_fee)}`);}}
  // Prepaid
  const prM=text.match(/prepaid\s*(?:₹\s*)?(\d+\.?\d*)\s*(%)?/i);
  if(prM){DEAL.prepaid_discount=parseFloat(prM[1]);DEAL.prepaid_type=prM[2]?'percent':'flat';addMsg('bot','Prepaid updated.');}
  // Quantity
  const qtyM=text.match(/(?:qty|quantity|×|x)\s*(\d+)|(\d+)\s*(?:qty|quantity|pieces?|units?)/i)||text.match(/^(\d+)\s*$/);
  if(qtyM&&!couponP){
    const q=parseInt(qtyM[1]||qtyM[2]);
    if(q>0&&q<=20){
      DEAL.quantity=q;DEAL.mrp=(DEAL.base_mrp||DEAL.mrp)*q;DEAL.discounted_price=(DEAL.base_price||DEAL.discounted_price)*q;
      addMsg('bot',`Quantity → <span class="hi">×${q}</span>. MRP: ₹${fmt(DEAL.mrp)} | Price: ₹${fmt(DEAL.discounted_price)}`);
    }
  }
  await step6_summary();
}

// ── Step 7: Save ─────────────────────────────────────────────────
async function step7_save(){
  await botDelay(600);addMsg('bot','Saving to DealsHub...');showTyping();
  try{
    const result=await apiSaveDeal();hideTyping();
    const cbStr=DEAL.cashback_override!==undefined?(DEAL.cashback_override_type==='percent'?DEAL.cashback_override+'%':'₹'+DEAL.cashback_override):(DEAL.store?.cashback+(DEAL.store?.cashback_type==='percent'?'%':'₹'));
    const qtyStr=DEAL.quantity>1?` × ${DEAL.quantity} units`:'';
    addMsg('bot',`<span class="gr">✅ Deal saved as draft!</span>\n\n📦 ${DEAL.product_name}${qtyStr}\n🏪 ${DEAL.store?.report_storename||DEAL.manual_retailer_name}\n📂 ${DEAL.detected_category}\n💰 Final: <span class="hi">₹${fmt(DEAL.final_deal_price)}</span>\n\nGo to <strong>Admin → Deals</strong> to approve and publish.`);
    await sleep(500);
    addQuickReplies([{label:'+ Create another deal',accent:true}],async()=>{Array.from(chatEl.children).forEach(c=>{if(c!==typingEl)c.remove();});await initFlow();});
    setStep('done');
  }catch(e){
    hideTyping();addMsg('bot',`<span class="rd">Failed to save.</span> ${e.message}`);
    addQuickReplies([{label:'Retry'}],async()=>await step7_save());
    setStep('confirm-deal');
  }
  unlockInput();
}

// ── Input events ─────────────────────────────────────────────────
document.getElementById('send-btn').onclick=sendMessage;
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
document.getElementById('new-deal-btn').onclick=async()=>{Array.from(chatEl.children).forEach(c=>{if(c!==typingEl)c.remove();});await initFlow();};
function sendMessage(){const inp=document.getElementById('input');const text=inp.value.trim();if(!text||input_locked)return;addMsg('user',text);inp.value='';inp.style.height='auto';handleUserInput(text);}

initFlow();
</script>
